<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#c67b5c">
    <title>🏔️ 新疆旅行记账本</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🏝️</span>
                <h1>旅行记账本</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm btn-outline" onclick="openMemberModal()" title="管理成员">
                    👥 成员
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 概览卡片 -->
        <section class="stats-grid" id="statsGrid">
            <!-- 动态渲染 -->
        </section>

        <!-- 分类汇总 -->
        <section class="section">
            <h2 class="section-title">📊 分类汇总</h2>
            <div class="category-summary" id="categorySummary">
                <!-- 动态渲染 -->
            </div>
        </section>

        <!-- 添加支出 -->
        <section class="section">
            <h2 class="section-title">✏️ 记一笔</h2>
            <form class="expense-form" id="expenseForm" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label>付款人</label>
                        <select name="member_id" id="memberSelect" required>
                            <!-- 动态渲染 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select name="category_id" id="categorySelect" required>
                            <!-- 动态渲染 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>金额 ¥</label>
                        <input type="number" name="amount" step="0.01" min="0.01"
                               placeholder="0.00" required id="amountInput">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group flex-2">
                        <label>备注（选填）</label>
                        <input type="text" name="description" placeholder="例如：海底捞火锅">
                    </div>
                    <div class="form-group">
                        <label>截图凭证</label>
                        <label class="file-upload-btn" for="receiptInput">
                            📎 选择图片
                        </label>
                        <input type="file" name="receipt" id="receiptInput"
                               accept="image/*" style="display:none"
                               onchange="previewReceipt(this)">
                        <span class="file-name" id="fileName"></span>
                    </div>
                </div>
                <div class="receipt-preview" id="receiptPreview" style="display:none">
                    <img id="receiptImg" src="" alt="凭证预览">
                    <button type="button" class="preview-remove" onclick="clearReceipt()">✕</button>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                    💰 记录支出
                </button>
            </form>
        </section>

        <!-- 支出明细 -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">📋 支出明细</h2>
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <!-- 分类筛选动态渲染 -->
                </div>
            </div>
            <div class="expense-list" id="expenseList">
                <div class="empty-state">
                    <span class="empty-icon">📝</span>
                    <p>还没有记录，开始记一笔吧！</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 成员管理弹窗 -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>👥 成员管理</h3>
                <button class="modal-close" onclick="closeMemberModal()">✕</button>
            </div>
            <div class="modal-body" id="memberList">
                <!-- 动态渲染 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeMemberModal()">完成</button>
            </div>
        </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div class="modal-overlay" id="imageModal" onclick="closeImageModal()">
        <div class="modal image-modal">
            <img id="imageModalImg" src="" alt="凭证截图">
            <button class="modal-close image-close" onclick="closeImageModal()">✕</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
